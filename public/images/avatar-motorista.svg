<svg width="500" height="600" viewBox="0 0 500 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo suave com carro -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c7d2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="carGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#374151;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f2937;stop-opacity:1" />
    </linearGradient>
    <filter id="textureFilter">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="600" fill="url(#bgGradient)"/>
  
  <!-- Carro ao fundo (simplificado e estilizado) -->
  <g opacity="0.3">
    <ellipse cx="380" cy="480" rx="80" ry="15" fill="#1f2937" opacity="0.3"/>
    <path d="M 300 450 L 320 420 L 440 420 L 460 450 L 465 475 L 295 475 Z" fill="url(#carGradient)" stroke="#111827" stroke-width="3"/>
    <path d="M 330 420 Q 345 395 385 390 Q 425 395 440 420" fill="url(#carGradient)"/>
    <ellipse cx="325" cy="475" rx="18" ry="18" fill="#1f2937"/>
    <ellipse cx="435" cy="475" rx="18" ry="18" fill="#1f2937"/>
  </g>
  
  <!-- Corpo do Motorista -->
  <!-- Pernas -->
  <rect x="210" y="450" width="35" height="140" fill="#4b5563" rx="17"/>
  <rect x="255" y="450" width="35" height="140" fill="#374151" rx="17"/>
  
  <!-- Sapatos sociais -->
  <ellipse cx="227" cy="590" rx="20" ry="12" fill="#1f2937"/>
  <ellipse cx="272" cy="590" rx="20" ry="12" fill="#1f2937"/>
  <rect x="215" y="585" width="10" height="3" fill="#111827"/>
  <rect x="265" y="585" width="10" height="3" fill="#111827"/>
  
  <!-- Torso - Blazer LSB -->
  <ellipse cx="250" cy="370" rx="70" ry="90" fill="#1e293b"/>
  
  <!-- Detalhes do blazer -->
  <path d="M 180 340 L 200 300 L 220 340 Z" fill="#1e293b"/>
  <path d="M 320 340 L 300 300 L 280 340 Z" fill="#1e293b"/>
  <line x1="250" y1="285" x2="250" y2="420" stroke="#0f172a" stroke-width="3"/>
  
  <!-- Botões do blazer -->
  <circle cx="248" cy="330" r="5" fill="#64748b"/>
  <circle cx="248" cy="360" r="5" fill="#64748b"/>
  <circle cx="248" cy="390" r="5" fill="#64748b"/>
  
  <!-- Logo "LSB Motoristas" bordado no blazer -->
  <g transform="translate(290, 350)">
    <!-- Fundo do bordado -->
    <rect x="-25" y="-15" width="50" height="30" fill="#0f172a" rx="3" opacity="0.3"/>
    
    <!-- Texto LSB com efeito de costura -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#e2e8f0" stroke="#94a3b8" stroke-width="0.5">LSB</text>
    <text x="0" y="12" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#cbd5e1">Motoristas</text>
    
    <!-- Pontos de costura ao redor -->
    <circle cx="-22" cy="-12" r="1" fill="#94a3b8"/>
    <circle cx="-18" cy="-12" r="1" fill="#94a3b8"/>
    <circle cx="-14" cy="-12" r="1" fill="#94a3b8"/>
    <circle cx="14" cy="-12" r="1" fill="#94a3b8"/>
    <circle cx="18" cy="-12" r="1" fill="#94a3b8"/>
    <circle cx="22" cy="-12" r="1" fill="#94a3b8"/>
    <circle cx="-22" cy="13" r="1" fill="#94a3b8"/>
    <circle cx="-18" cy="13" r="1" fill="#94a3b8"/>
    <circle cx="18" cy="13" r="1" fill="#94a3b8"/>
    <circle cx="22" cy="13" r="1" fill="#94a3b8"/>
  </g>
  
  <!-- Camiseta branca por baixo -->
  <path d="M 210 290 Q 250 280 290 290 L 290 310 Q 250 300 210 310 Z" fill="#ffffff"/>
  
  <!-- Braços -->
  <ellipse cx="165" cy="360" rx="25" ry="65" fill="#1e293b" transform="rotate(-15 165 360)"/>
  <ellipse cx="335" cy="360" rx="25" ry="65" fill="#0f172a" transform="rotate(15 335 360)"/>
  
  <!-- Mãos (tom 20% mais claro - #f5c4a0) -->
  <ellipse cx="165" cy="410" rx="16" ry="18" fill="#f5c4a0"/>
  <ellipse cx="335" cy="410" rx="16" ry="18" fill="#f5c4a0"/>
  
  <!-- Pescoço -->
  <rect x="225" y="250" width="50" height="40" fill="#f5c4a0" rx="10"/>
  
  <!-- Cabeça (tom 20% mais claro) -->
  <ellipse cx="250" cy="215" rx="50" ry="58" fill="#f5c4a0"/>
  
  <!-- Orelhas -->
  <ellipse cx="202" cy="215" rx="12" ry="18" fill="#f0b890"/>
  <ellipse cx="298" cy="215" rx="12" ry="18" fill="#f0b890"/>
  
  <!-- Cabelo estilizado -->
  <ellipse cx="250" cy="180" rx="52" ry="40" fill="#1a1a1a"/>
  <path d="M 200 190 Q 225 165 250 165 Q 275 165 300 190" fill="#1a1a1a"/>
  <ellipse cx="220" cy="195" rx="18" ry="25" fill="#1a1a1a"/>
  <ellipse cx="280" cy="195" rx="18" ry="25" fill="#1a1a1a"/>
  
  <!-- Sobrancelhas -->
  <path d="M 220 200 Q 230 195 238 198" fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  <path d="M 262 198 Q 270 195 280 200" fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Olhos grandes estilizados -->
  <ellipse cx="230" cy="210" rx="10" ry="14" fill="#ffffff"/>
  <ellipse cx="270" cy="210" rx="10" ry="14" fill="#ffffff"/>
  <circle cx="231" cy="212" r="7" fill="#4a3020"/>
  <circle cx="271" cy="212" r="7" fill="#4a3020"/>
  <circle cx="233" cy="210" r="3" fill="#ffffff"/>
  <circle cx="273" cy="210" r="3" fill="#ffffff"/>
  
  <!-- Nariz estilizado -->
  <path d="M 250 220 L 248 235 L 252 235 Z" fill="#e09f78"/>
  <ellipse cx="245" cy="236" rx="3" ry="2" fill="#d08560"/>
  <ellipse cx="255" cy="236" rx="3" ry="2" fill="#d08560"/>
  
  <!-- Barba estilizada (característica principal) -->
  <path d="M 210 230 Q 210 260 250 265 Q 290 260 290 230" fill="#2d2d2d"/>
  <ellipse cx="250" cy="250" rx="35" ry="20" fill="#2d2d2d"/>
  <path d="M 220 235 Q 225 245 230 240" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <path d="M 270 240 Q 275 245 280 235" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Sorriso amigável -->
  <path d="M 230 245 Q 250 253 270 245" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <path d="M 230 246 Q 250 254 270 246" fill="#c74949" opacity="0.7"/>
</svg>